<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽天 価格チェッカー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap');
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#2e3444;
  --text:#f4f6ff;--text2:#b8c0d8;--text3:#7880a0;
  --accent:#f0c040;--red:#e05050;--green:#40c8a0;--blue:#4a9eff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;font-size:14px}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--accent)}
.product-info{font-size:12px;color:var(--text3)}
.product-name-display{font-size:14px;font-weight:700;color:var(--text2);max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{padding:24px;max-width:800px;margin:0 auto}

.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.section-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}

/* ステップ */
.step{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.step-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;flex-shrink:0;width:28px}
.step-body{flex:1}
.step-label{font-size:13px;font-weight:600;margin-bottom:8px}
.step-desc{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.7}

/* URL入力 */
.url-row{display:flex;gap:8px}
.url-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:9px 14px;outline:none;transition:border-color .15s}
.url-input:focus{border-color:var(--accent)}
.url-input::placeholder{color:var(--text3)}

/* 価格入力 */
.price-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.price-field{display:flex;flex-direction:column;gap:5px}
.price-field label{font-size:11px;letter-spacing:1px;color:var(--text3)}
.price-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:18px;font-weight:700;padding:9px 14px;outline:none;width:130px;transition:border-color .15s}
.price-input:focus{border-color:var(--blue)}

/* ターゲット価格 */
.target-display{background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.3);border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.target-label{font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.target-price{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--accent);letter-spacing:1px;line-height:1}
.target-desc{font-size:12px;color:var(--text2)}

/* ボタン */
.btn{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#ffd060;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text2);color:var(--text)}
.btn-danger{background:rgba(224,80,80,.15);color:var(--red);border:1px solid rgba(224,80,80,.3)}
.btn-open{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3);font-size:13px;padding:9px 18px;border-radius:8px;cursor:pointer;transition:all .15s;font-weight:700}
.btn-open:hover{background:rgba(74,158,255,.3)}

/* 記憶済みURL */
.saved-url-display{background:var(--surface2);border:1px solid var(--green);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:8px;word-break:break-all;line-height:1.5}
.saved-url-display .url-text{flex:1;color:var(--text2)}

/* ログ */
.log-table{width:100%;border-collapse:collapse;font-size:12px}
.log-table th{text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.log-table td{padding:8px 10px;border-bottom:1px solid rgba(46,52,68,.5);color:var(--text2)}
.log-table tr:last-child td{border-bottom:none}
.log-empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}

/* status */
.status-bar{padding:6px 24px;font-size:12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--text3)}
.dot{width:6px;height:6px;border-radius:50%}
.dot.ok{background:var(--green)}
.dot.warn{background:var(--accent)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">価格チェッカー</div>
  <div>
    <div class="product-name-display" id="product-name-display">— 商品未選択 —</div>
    <div class="product-info" id="product-code-display"></div>
  </div>
</div>

<div class="status-bar">
  <div class="dot ok" id="status-dot"></div>
  <span id="status-text">URIAGE FBから商品を開いてください</span>
</div>

<div class="main">

  <!-- STEP 1: 楽天で検索 -->
  <div class="section">
    <div class="section-title">Step 1 — 楽天で検索してURLを記憶</div>

    <div id="saved-url-section" style="display:none;margin-bottom:16px">
      <div style="font-size:11px;letter-spacing:1px;color:var(--green);margin-bottom:8px">✓ 記憶済み検索URL</div>
      <div class="saved-url-display">
        <span class="url-text" id="saved-url-text"></span>
        <button class="btn-open" onclick="openSavedUrl()" id="open-saved-btn">開く →</button>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:11px" onclick="clearSavedUrl()">削除</button>
      </div>
    </div>

    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-label">楽天市場で競合を検索する</div>
        <div class="step-desc">下のボタンで楽天市場が開きます。自分でキーワードを入力して競合商品を見つけてください。</div>
        <button class="btn-open" onclick="openRakutenSearch()">🔍 楽天市場を開く</button>
      </div>
    </div>

    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-label">検索結果のURLを貼り付けて記憶する</div>
        <div class="step-desc">「これだ！」という検索結果ページのURLをブラウザのアドレスバーからコピーして貼り付け。次回から自動で開きます。</div>
        <div class="url-row">
          <input type="text" class="url-input" id="url-input" placeholder="https://search.rakuten.co.jp/search/mall/...">
          <button class="btn btn-primary" onclick="saveUrl()">記憶する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 2: 価格入力 -->
  <div class="section">
    <div class="section-title">Step 2 — 競合価格を入力</div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-label">楽天市場で確認した2番手の価格を入力</div>
        <div class="price-row">
          <div class="price-field">
            <label>自社現在価格</label>
            <input type="number" class="price-input" id="my-price" placeholder="¥0" oninput="calcTarget()">
          </div>
          <div class="price-field">
            <label>競合2番手価格</label>
            <input type="number" class="price-input" id="competitor-price" placeholder="¥0" oninput="calcTarget()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TARGET PRICE -->
  <div class="target-display" id="target-section" style="display:none;margin-bottom:16px">
    <div>
      <div class="target-label">推奨設定価格（2番手 − 1円）</div>
      <div class="target-price" id="target-price">¥—</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
      <div class="target-desc" id="target-desc"></div>
      <button class="btn btn-primary" id="log-btn" onclick="logChange()" style="font-size:15px;padding:12px 28px">✓ この価格に変更した</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>価格変更ログ</span>
      <button class="btn btn-danger" style="font-size:11px;padding:4px 10px" onclick="clearLog()">ログ削除</button>
    </div>
    <div id="log-area">
      <div class="log-empty">まだ価格変更の記録がありません</div>
    </div>
  </div>

</div><!-- /main -->

<script>
const KEYWORD_MAP_KEY = 'rk_url_map_v1';   // 商品コード→楽天検索URL
const PRICE_LOG_KEY   = 'rk_price_log_v1'; // 価格変更ログ

let currentCode  = '';
let currentName  = '';
let currentPrice = 0;
let savedUrl     = '';

// ============================================================
// INIT — URLパラメータ受け取り
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(location.search);
  currentCode  = p.get('code')  || '';
  currentName  = p.get('name')  || '';
  currentPrice = parseInt(p.get('price')||'0') || 0;

  if(currentName) {
    el('product-name-display').textContent = currentName;
    el('product-code-display').textContent = currentCode;
    el('my-price').value = currentPrice || '';
    calcTarget();
    setStatus('ok', `「${currentName}」の価格チェック`);
  }

  // 記憶済みURLを確認
  if(currentCode) {
    const map = loadMap();
    savedUrl = map[currentCode] || '';
    if(savedUrl) showSavedUrl();
  }

  renderLog();
});

// ============================================================
// URL記憶
// ============================================================
function loadMap() {
  try{ return JSON.parse(localStorage.getItem(KEYWORD_MAP_KEY)||'{}'); }catch(e){ return {}; }
}
function saveMap(map) {
  try{ localStorage.setItem(KEYWORD_MAP_KEY, JSON.stringify(map)); }catch(e){}
}

function saveUrl() {
  const url = el('url-input').value.trim();
  if(!url) { alert('URLを入力してください'); return; }
  if(!url.startsWith('http')) { alert('正しいURLを入力してください'); return; }
  if(!currentCode) {
    // コードなしの場合は名前をキーにする
    const map = loadMap();
    map['__' + currentName] = url;
    saveMap(map);
  } else {
    const map = loadMap();
    map[currentCode] = url;
    saveMap(map);
  }
  savedUrl = url;
  showSavedUrl();
  el('url-input').value = '';
  setStatus('ok', '検索URLを記憶しました！次回から自動で開きます');
}

function showSavedUrl() {
  el('saved-url-section').style.display = 'block';
  el('saved-url-text').textContent = savedUrl;
}

function clearSavedUrl() {
  if(!confirm('記憶したURLを削除しますか？')) return;
  const map = loadMap();
  delete map[currentCode];
  delete map['__' + currentName];
  saveMap(map);
  savedUrl = '';
  el('saved-url-section').style.display = 'none';
  setStatus('ok', 'URLを削除しました');
}

function openSavedUrl() {
  if(savedUrl) window.open(savedUrl, '_blank');
}

function openRakutenSearch() {
  const keyword = currentName
    ? encodeURIComponent(currentName.replace(/【[^】]*】/g,'').trim().substring(0,30))
    : '';
  window.open(`https://search.rakuten.co.jp/search/mall/${keyword}/?s=2`, '_blank');
}

// ============================================================
// 価格計算
// ============================================================
function calcTarget() {
  const myPrice   = parseInt(el('my-price').value)||0;
  const compPrice = parseInt(el('competitor-price').value)||0;
  if(!compPrice) { el('target-section').style.display='none'; return; }
  const target = compPrice - 1;
  el('target-price').textContent = '¥' + fmt(target);
  const diff = target - myPrice;
  if(myPrice) {
    el('target-desc').textContent = diff > 0
      ? `現在より +¥${fmt(diff)} 値上げ`
      : diff < 0
      ? `現在より -¥${fmt(Math.abs(diff))} 値下げ`
      : '現在と同額';
    el('target-desc').style.color = diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text3)';
  }
  el('target-section').style.display = 'flex';
}

// ============================================================
// 価格変更ログ
// ============================================================
function loadLog() {
  try{ return JSON.parse(localStorage.getItem(PRICE_LOG_KEY)||'[]'); }catch(e){ return []; }
}
function saveLog(logs) {
  try{ localStorage.setItem(PRICE_LOG_KEY, JSON.stringify(logs)); }catch(e){}
}

function logChange() {
  const myPrice   = parseInt(el('my-price').value)||0;
  const compPrice = parseInt(el('competitor-price').value)||0;
  if(!compPrice) { alert('競合価格を入力してください'); return; }
  const target = compPrice - 1;
  const logs = loadLog();
  logs.unshift({
    code:       currentCode,
    name:       currentName,
    oldPrice:   myPrice,
    newPrice:   target,
    competitor: compPrice,
    date:       new Date().toISOString(),
  });
  saveLog(logs.slice(0,200));
  el('my-price').value = target;
  calcTarget();
  renderLog();
  setStatus('ok', `¥${fmt(target)} への価格変更を記録しました`);
}

function clearLog() {
  if(!confirm('ログをすべて削除しますか？')) return;
  saveLog([]);
  renderLog();
}

function renderLog() {
  const logs = loadLog();
  const area = el('log-area');
  if(!logs.length) {
    area.innerHTML = '<div class="log-empty">まだ価格変更の記録がありません</div>';
    return;
  }
  area.innerHTML = `<table class="log-table">
    <thead><tr>
      <th>日付</th><th>商品名</th><th>変更前</th><th>競合</th><th>変更後</th>
    </tr></thead>
    <tbody>
      ${logs.map(l=>`<tr>
        <td style="white-space:nowrap">${new Date(l.date).toLocaleDateString('ja-JP')}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.name)}</td>
        <td style="text-align:right;color:var(--text3)">¥${fmt(l.oldPrice)}</td>
        <td style="text-align:right;color:var(--red)">¥${fmt(l.competitor)}</td>
        <td style="text-align:right;color:var(--accent);font-weight:700">¥${fmt(l.newPrice)}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ============================================================
// UTILS
// ============================================================
function fmt(n){ return Math.round(n||0).toLocaleString('ja-JP'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function el(id){ return document.getElementById(id); }
function setStatus(state, msg){
  el('status-dot').className = 'dot ' + (state==='ok'?'ok':'warn');
  el('status-text').textContent = msg;
}
</script>
</body>
</html>
